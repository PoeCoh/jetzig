# This is a basic workflow to help you get started with Actions

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' #Makes sense, we are testing against master
  workflow_dispatch:

jobs:
  build:
    runs-on: Mac
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Setup Zig
      # You may pin to the exact commit or the version.
      # uses: goto-bus-stop/setup-zig@41ae19e72e21b9a1380e86ff9f058db709fc8fc6
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master
          cache: true # Let's see how this behaves

      - run: zig version
      - run: zig env

      - name: Build
        run: zig build --verbose

      - name: Run Tests
        run: zig build test --summary all

      - name: Run App Tests
        run: |
          cd demo
          zig build -Denvironment=testing jetzig:test